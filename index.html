<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alejandro Ajenjo Rodríguez — Desarrollador Web</title>
    <meta
      name="description"
      content="Portfolio de Alejandro Ajenjo Rodríguez, Desarrollador de Aplicaciones Web con sede en Catarroja, Valencia."
    />
    <meta
      name="keywords"
      content="desarrollador web, front-end, portfolio, Valencia, España"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Runs before paint to prevent theme flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t) {
            document.documentElement.setAttribute('data-theme', t)
          } else if (window.matchMedia('(prefers-color-scheme:dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
